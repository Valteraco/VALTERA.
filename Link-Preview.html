<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valtera Link Preview Generator</title>
    
    <!-- Import your brand fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <style>
        body {
            /* Centers the canvas on your screen so it's easy to screenshot */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #EAEAEA;
            margin: 0;
        }

        /* Strict 1200x630 dimensions for Open Graph / Social Media Previews */
        .og-image-canvas {
            width: 1200px;
            height: 630px;
            background-color: #ffffff; /* Pure White */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1); 
            position: relative;
            overflow: hidden;
        }

        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .brand-logo {
            font-family: 'Playfair Display', serif;
            font-size: 160px;
            font-weight: 700;
            color: #1E3F33; /* Brand: Deep Forest Green */
            margin: 0;
            line-height: 1;
        }

        /* --- CUSTOM KERNING RULES --- */
        
        /* 1. Tighter gap between V and A */
        .kern-v {
            letter-spacing: -2px; 
        }

        /* 2. Exactly 14px spacing between A-L, L-T, T-E, E-R, and R-A */
        .kern-14 {
            letter-spacing: 14px;
        }

        /* 3. Tighter gap between the final A and the period */
        .kern-a-end {
            letter-spacing: 10px; 
        }

        .brand-subtext {
            font-family: 'Inter', sans-serif;
            font-size: 32px; 
            font-weight: 500;
            color: #666666; /* Brand: Secondary Text (Muted Gray) */
            margin-top: 70px;
            letter-spacing: 1px; 
        }
    </style>
</head>
<body>

    <!-- This box is exactly 1200x630 pixels -->
    <div class="og-image-canvas" id="capture-area">
        <div class="logo-container">
            <!-- The word is broken into spans so we can control the gap after each letter -->
            <h1 class="brand-logo"><span class="kern-v">V</span><span class="kern-14">A</span><span class="kern-14">L</span><span class="kern-14">T</span><span class="kern-14">E</span><span class="kern-14">R</span><span class="kern-a-end">A</span><span>.</span></h1>
            
            <div class="brand-subtext">Connecting Buyers With Quality Lenders</div>
        </div>
    </div>

</body>
</html>
